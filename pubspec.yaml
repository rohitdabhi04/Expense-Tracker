name: expense_tracker
description: Personal Finance Manager - Track income, expenses across cash and bank accounts
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Sign In
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.2

  # UI & Charts
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  intl: ^0.19.0

  # Utils
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: false
  windows:
    generate: false